name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@v0.10.0
          test -z "$(gofumpt -l .)" || { echo "gofumpt needed on:"; gofumpt -l .; exit 1; }

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...
